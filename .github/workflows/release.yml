name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PRODUCT_NAME: AparokshaStarter

jobs:
  build-release-assets:
    name: Package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            backend: ADWAITA
            archive_name: AparokshaStarter-linux-x64.tar.gz
            allow_failure: false

          - os: ubuntu-24.04-arm
            label: linux-arm64
            backend: ADWAITA
            archive_name: AparokshaStarter-linux-arm64.tar.gz
            allow_failure: false

          - os: windows-latest
            label: windows-x64
            backend: WINUI
            archive_name: AparokshaStarter-windows-x64.zip
            allow_failure: false

          - os: windows-11-arm
            label: windows-arm64
            backend: WINUI
            archive_name: AparokshaStarter-windows-arm64.zip
            allow_failure: false

          - os: macos-latest
            label: macos-arm64
            backend: APPKIT
            archive_name: AparokshaStarter-macos-arm64.zip
            allow_failure: true

          - os: macos-15-intel
            label: macos-x64
            backend: APPKIT
            archive_name: AparokshaStarter-macos-x64.zip
            allow_failure: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@v1.13.0
        with:
          swift-version: "6.2.4"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Build
        env:
          APAROKSHA_FRAMEWORK: ${{ matrix.backend }}
        run: swift build -c release

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp ".build/release/${PRODUCT_NAME}" "release/${PRODUCT_NAME}"
          tar -czf "${{ matrix.archive_name }}" -C release "${PRODUCT_NAME}"

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          cp ".build/release/${PRODUCT_NAME}" "release/${PRODUCT_NAME}"
          ditto -c -k --sequesterRsrc --keepParent release "${{ matrix.archive_name }}"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item ".build\release\$env:PRODUCT_NAME.exe" "release\$env:PRODUCT_NAME.exe"
          Compress-Archive -Path "release\*" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-assets
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show packaged files
        run: ls -la release-assets

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"