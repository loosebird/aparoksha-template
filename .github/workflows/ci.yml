name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality (SwiftFormat + SwiftLint)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SwiftFormat and SwiftLint
        run: |
          brew update
          brew install swiftformat swiftlint

      - name: Show quality tool versions
        run: |
          swiftformat --version
          swiftlint version

      - name: SwiftFormat
        run: swiftformat --lint . --reporter github-actions-log

      - name: SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml

  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            backend: ADWAITA
            allow_failure: false

          - os: ubuntu-24.04-arm
            label: linux-arm64
            backend: ADWAITA
            allow_failure: false

          - os: windows-latest
            label: windows-x64
            backend: WINUI
            allow_failure: false

          - os: windows-11-arm
            label: windows-arm64
            backend: WINUI
            allow_failure: false

          - os: macos-latest
            label: macos-arm64
            backend: APPKIT
            allow_failure: true

          - os: macos-15-intel
            label: macos-x64
            backend: APPKIT
            allow_failure: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@v1.13.0
        with:
          swift-version: "6.2.4"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Show toolchain
        run: swift --version

      - name: Build
        env:
          APAROKSHA_FRAMEWORK: ${{ matrix.backend }}
        run: swift build -c release